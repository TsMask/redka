# Redka 服务器配置文件示例
# 使用 YAML 格式

# ===========================================
# 服务器网络设置
# ===========================================
host: "0.0.0.0"       # 监听地址
port: 6379            # 监听端口
sock: ""              # Unix socket 路径（如果设置，将覆盖 host 和 port）

# ===========================================
# 数据库配置
# ===========================================
# 只需一个 DSN 字段，自动根据前缀识别数据库类型

# --- SQLite 示例 ---
# 支持多种格式：file:, sqlite:, sqlite3: 或直接文件路径
db_dsn: "sqlite:/usr/local/etc/redka/redka.sqlite?vfs=memdb"
# db_dsn: "sqlite:/tmp/redka.sqlite?vfs=memdb" # 内存模式不生成文件
# db_dsn: "sqlite3:/tmp/redka.sqlite"
# db_dsn: "/tmp/redka.sqlite"  # 直接文件路径也会被识别为 SQLite

# --- PostgreSQL 示例 ---
# db_dsn: "postgres://user:password@localhost:5432/dbname?sslmode=disable"
# db_dsn: "postgresql://user:pass@host:port/db"  # postgresql:// 也支持

# --- MySQL 示例 ---
# db_dsn: "mysql://user:password@tcp(localhost:3306)/dbname"
# db_dsn: "mariadb://user:pass@tcp(host:3306)/db"  # mariadb:// 也支持
# db_dsn: "user:password@tcp(localhost:3306)/dbname"  # 不带前缀的 MySQL 格式

# ===========================================
# 安全设置
# ===========================================
password: ""          # 认证密码（留空表示不需要认证）
databases: 16        # 逻辑数据库数量（默认：16，Redis默认）

# ===========================================
# 慢查询日志设置
# ===========================================
slowlog_max_len: 128      # 慢查询日志最大条目数（默认：128）
slowlog_threshold: 10000  # 慢查询阈值（微秒），默认10000µs=10ms

# ===========================================
# 清理设置
# ===========================================
cleanup_interval: 10  # 过期key清理间隔（秒），默认10秒（类似Redis的定期删除）

# ===========================================
# 日志设置
# ===========================================
verbose: false        # 是否启用详细日志
log_file: "/usr/local/etc/redka/redka.log"          # 日志文件路径（留空表示输出到 stdout）
